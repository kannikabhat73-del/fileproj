<!DOCTYPE html>
<html>
<head>
<title>Trash</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl mb-4">🗑 Trash</h1>

<!-- 🔍 SEARCH -->
<input type="text" id="search" placeholder="Search deleted files..."
class="w-full p-2 mb-4 rounded text-black" onkeyup="loadTrash()">

<div id="trashData"></div>

<script>

const URL = "YOUR_WEB_APP_URL";

// 🔄 Load + Search
function loadTrash(){

fetch(URL)
.then(res => res.json())
.then(files => {

  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  files.forEach(file => {

    if(file.dept === "TRASH" && file.name.toLowerCase().includes(search)){

      html += `
      <div class="bg-gray-800 p-3 rounded mb-2 flex justify-between items-center">

        <div>
          <span class="text-gray-300">${file.name}</span>
          <span class="text-gray-500 ml-2">${file.date}</span>
        </div>

        <button onclick="restore('${file.name}')" 
        class="bg-green-500 px-3 py-1 rounded">
        Restore
        </button>

      </div>
      `;
    }

  });

  if(html === ""){
    html = `<p class="text-gray-400">No files found</p>`;
  }

  document.getElementById("trashData").innerHTML = html;

});

}

// ♻ RESTORE
function restore(name){

fetch(URL,{
  method:"POST",
  body: JSON.stringify({
    action:"restore",
    name:name
  })
})
.then(()=> loadTrash());

}

// 🔄 Initial load
loadTrash();

</script>

</body>
</html>
