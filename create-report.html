<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Report Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 min-h-screen flex items-center justify-center p-6">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-lg w-full max-w-3xl text-white">

<h2 class="text-3xl font-bold mb-6 text-center">Create Event Report</h2>

<!-- PAGE 1 -->
<div id="page1" class="space-y-4">

<input type="text" id="program" placeholder="Program Name" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
<input type="text" id="coordination" placeholder="Coordination Name" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
<input type="text" id="department" placeholder="Department Name" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
<input type="text" id="venue" placeholder="Venue" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>

<div class="grid grid-cols-2 gap-4">
<input type="date" id="dateFrom" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
<input type="date" id="dateTo" class="w-full p-3 rounded-lg bg-white/20 outline-none">
</div>

<div class="grid grid-cols-2 gap-4">
<input type="time" id="timeFrom" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
<input type="time" id="timeTo" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>
</div>

<input type="number" id="participants" placeholder="Number of Participants" class="w-full p-3 rounded-lg bg-white/20 outline-none" required>

<button onclick="nextPage()" class="w-full bg-indigo-500 hover:bg-indigo-600 p-3 rounded-lg font-semibold">Next</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="space-y-4 hidden">

<input type="text" id="guestName" placeholder="Guest Name" class="w-full p-3 rounded-lg bg-white/20 outline-none">
<input type="text" id="guestDesignation" placeholder="Guest Designation" class="w-full p-3 rounded-lg bg-white/20 outline-none">
<textarea id="description" placeholder="Event Description" class="w-full p-3 rounded-lg bg-white/20 outline-none"></textarea>

<p class="text-sm text-gray-200">Hold Ctrl to select multiple images</p>
<input type="file" id="images" multiple accept="image/*" class="w-full p-3 rounded-lg bg-white/20 outline-none">

<div class="flex gap-4">
<button onclick="prevPage()" class="w-1/2 bg-gray-500 hover:bg-gray-600 p-3 rounded-lg font-semibold">Back</button>
<button onclick="generateReport()" class="w-1/2 bg-green-500 hover:bg-green-600 p-3 rounded-lg font-semibold">Generate Report</button>
</div>
</div>

<!-- REPORT OUTPUT -->
<div id="reportOutput" class="mt-8 hidden bg-white text-black p-6 rounded-xl"></div>

</div>

<script>

// PAGE NAVIGATION
function nextPage(){
    const fields = ["program","coordination","department","venue","dateFrom","timeFrom","timeTo","participants"];
    for(let id of fields){
        if(!document.getElementById(id).value){
            alert("Fill all fields");
            return;
        }
    }
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
}

function prevPage(){
    page2.classList.add("hidden");
    page1.classList.remove("hidden");
}

// GENERATE REPORT WITH BASE64 IMAGES
function generateReport(){

    const imageFiles = document.getElementById("images").files;
    let imagePreview = "";

    if(imageFiles.length === 0){
        showReport("");
        return;
    }

    let loaded = 0;

    for(let i=0;i<imageFiles.length;i++){

        const reader = new FileReader();

        reader.onload = function(e){
            imagePreview += `<img src="${e.target.result}" style="width:100%;height:200px;margin-bottom:10px;">`;
            loaded++;

            if(loaded === imageFiles.length){
                showReport(imagePreview);
            }
        };

        reader.readAsDataURL(imageFiles[i]);
    }
}

// DISPLAY REPORT
function showReport(imagePreview){

const program = programEl.value;
const coordination = coordinationEl.value;
const department = departmentEl.value;
const venue = venueEl.value;
const participants = participantsEl.value;

const dateFrom = dateFromEl.value;
const dateTo = dateToEl.value;

const timeFromRaw = timeFromEl.value;
const timeToRaw = timeToEl.value;

const formattedDateFrom = new Date(dateFrom).toLocaleDateString('en-GB');
const formattedDateTo = dateTo ? new Date(dateTo).toLocaleDateString('en-GB') : null;
const displayDate = formattedDateTo ? `${formattedDateFrom} to ${formattedDateTo}` : formattedDateFrom;

const timeFrom = new Date(`1970-01-01T${timeFromRaw}`).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
const timeTo = new Date(`1970-01-01T${timeToRaw}`).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

const guestName = guestNameEl.value;
const guestDesignation = guestDesignationEl.value;
const description = descriptionEl.value;

const output = document.getElementById("reportOutput");

output.innerHTML = `
<h3 class="text-xl font-bold mb-3 text-center">Event Report</h3>

<p><b>Program:</b> ${program}</p>
<p><b>Department:</b> ${department}</p>
<p><b>Coordination:</b> ${coordination}</p>
<p><b>Venue:</b> ${venue}</p>
<p><b>Date:</b> ${displayDate}</p>
<p><b>Time:</b> ${timeFrom} to ${timeTo}</p>
<p><b>Participants:</b> ${participants}</p>

<hr>

<p>${description}</p>

<div>${imagePreview}</div>

<div class="flex gap-4 mt-4">
<button onclick="editReport()" class="bg-yellow-500 px-3 py-2 rounded">Edit</button>
<button onclick="saveReport()" class="bg-blue-500 px-3 py-2 rounded text-white">Save</button>
</div>
`;

output.classList.remove("hidden");
page2.classList.add("hidden");
}

// EDIT
function editReport(){
    reportOutput.classList.add("hidden");
    page1.classList.remove("hidden");
}

// SAVE WITHOUT BUTTONS
function saveReport(){

const clone = reportOutput.cloneNode(true);
clone.querySelectorAll("button").forEach(btn => btn.remove());

const content = clone.innerHTML;

fetch("https://script.google.com/macros/s/AKfycbwHtW1CaIz1DIbaTqgmCNGoWt4hwICHOBki2oyf7BjEFStaE47ZX-ViKPCASAIDcDTMMw/exec",{
method:"POST",
body:JSON.stringify({
program: program.value,
department: department.value,
date: dateFrom.value,
content: content
})
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

</script>

</body>
</html>
